<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Month Tracker</title>
<style>
body {
  font-family: Arial;
  color: white;
  padding: 20px;

  background: 
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.controls {
  text-align: center;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

.day {
  max-width: 700px;
  margin: auto;
}

.task {
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(6px);
  padding: 12px 20px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task span {
  flex: 1;
  margin-right: 20px;
}

button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  min-width: 110px;
}

.done {
  background: #22c55e;
}

.completed {
  background: #64748b;
}
</style>
</head>
<body>

<h1>2 Month Fitness + Career Tracker</h1>

<div class="controls">
  <label>Select Day: </label>
  <select id="daySelector"></select>
</div>

<div id="container"></div>

<script>
const tasks = [
"4:30 AM - Black Coffee + Cardamom",
"5:00 AM - Treadmill (30 min Incline)",
"5:45 AM - Breakfast (Chickpeas + 2 Eggs + Moringa)",
"7:00 AM - Push-ups (3x10) + Pull-ups (3x5)",
"8:00 AM - Crunches (3x15) + Plank (2x45s)",
"9:00 AM - Push-ups (3x10) + Pull-ups (3x5)",
"10:00 AM - Crunches (3x15) + Plank (2x45s)",
"11:00 AM - Push-ups (3x10) + Pull-ups (3x5)",
"12:00 PM - Crunches (3x15) + Plank (2x45s)",
"1:00 PM - Lunch (2 Eggs + Soya + Curd)",
"1:45 PM - Ginger + Saunf Drink",
"2:00 PM - Study (15 min)",
"3:00 PM - Study (15 min)",
"4:00 PM - Study (15 min)",
"5:00 PM - Study (15 min)",
"6:00 PM - Study (15 min)",
"7:00 PM - Ginger + Saunf Drink",
"8:00 PM - Dinner (2 Eggs + Dal)",
"9:00 PM - Sleep"
];

const container = document.getElementById("container");
const selector = document.getElementById("daySelector");

// Populate dropdown
for (let i = 1; i <= 60; i++) {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = `Day ${i}`;
  selector.appendChild(option);
}

function renderDay(day) {
  container.innerHTML = "";

  const dayDiv = document.createElement("div");
  dayDiv.className = "day";

  tasks.forEach((taskText) => {
    const task = document.createElement("div");
    task.className = "task";

    const span = document.createElement("span");
    span.textContent = taskText;

    const btn = document.createElement("button");
    btn.innerText = "Mark Done";
    btn.className = "done";

    btn.onclick = () => {
      if (btn.innerText === "Mark Done") {
        btn.innerText = "Completed";
        btn.className = "completed";
      } else {
        btn.innerText = "Mark Done";
        btn.className = "done";
      }
    };

    task.appendChild(span);
    task.appendChild(btn);
    dayDiv.appendChild(task);
  });

  container.appendChild(dayDiv);
}

selector.addEventListener("change", (e) => {
  renderDay(e.target.value);
});

// Initial load
renderDay(1);
</script>

</body>
</html>
