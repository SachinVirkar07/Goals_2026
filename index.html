<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Fitness Tracker</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  color: #e5e7eb;
  margin: 0;
  padding: 20px;

  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1599058917212-d750089bc07e');
  background-size: cover;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.controls {
  text-align: center;
  margin-bottom: 20px;
}

select {
  padding: 10px;
  border-radius: 8px;
}

.day {
  max-width: 750px;
  margin: auto;
}

.task {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  background: rgba(30,41,59,0.6);
}

button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.done {
  background: gold;
}

.completed {
  background: limegreen;
  color: white;
}
</style>
</head>

<body>

<h1>🔥 Daily Discipline Tracker</h1>

<div class="controls">
  <select id="daySelector"></select>
</div>

<div id="container"></div>

<script>

const tasks = [

"4:00 AM → Cardamom Black Coffee ☕",
"4:30 AM → Shilajit (1 Tablet)",

// WORKOUT
"4:50 – 5:20 AM → Strength Training + 750ml Water (Salt + Lemon)",

"Workout Set 1 → Push-ups 12 | Pull-ups 5 | Crunches 12 | Plank 45s | Hanging Knee Raise 5",
"Workout Set 2 → Push-ups 12 | Pull-ups 5 | Crunches 12 | Plank 45s | Hanging Knee Raise 5",
"Workout Set 3 → Push-ups 12 | Pull-ups MAX | Leg Raises 12 | Plank 45s | Hanging Knee Raise",

// TREADMILL
"5:20 – 5:50 AM → Treadmill (Incline Walk)",
"• 5 min incline 5 speed 3",
"• 20 min incline 10 speed 3.5",
"• 5 min incline 5 speed 3",

// SPECIAL DAYS
"Sunday/Thursday Upgrade → Incline 14 + Jog 5 min speed 8",

// MORNING ROUTINE
"6:00 – 7:00 AM → Bath 🚿",
"7:00 AM → Breakfast 🍳 (Eggs + Chickpeas + Soya + Moringa)",

// WORK BLOCK
"8:00 – 11:00 AM → Work + Meeting",
"11:00 AM → Green Tea 🍵",
"11:30 – 11:50 AM → Walk + YouTube Mock Interview",

// MIDDAY
"12:30 PM → Apple Cider Vinegar",
"12:45 PM → Lunch 🍽️ (Soya + Roti + Sabji + Curd)",

"2:15 PM → Green Tea 🍵",
"2:30 – 2:50 PM → Walk + Mock Interview",

"3:30 PM → Lemon + Jeera + Ginger Water",

// EVENING
"4:00 PM → Snacks (Chickpeas + Soya + Moringa)",
"5:00 – 5:20 PM → Walk Outdoor",

// NIGHT
"7:00 PM → Lemon + Jeera + Ginger Water",
"7:30 PM → Dinner 🍽️ (Eggs + Dal + Sabji + Curd + Salad)",
"8:00 PM → 10 min Walk",

"8:30 PM → Sleep 😴 (No Phone)"
];

const container = document.getElementById("container");
const selector = document.getElementById("daySelector");

// Create 60 days
for (let i = 1; i <= 60; i++) {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = "Day " + i;
  selector.appendChild(option);
}

function renderDay() {
  container.innerHTML = "";

  const dayDiv = document.createElement("div");
  dayDiv.className = "day";

  tasks.forEach(taskText => {
    const task = document.createElement("div");
    task.className = "task";

    const span = document.createElement("span");
    span.textContent = taskText;

    const btn = document.createElement("button");
    btn.innerText = "Mark Done";
    btn.className = "done";

    btn.onclick = () => {
      if (btn.innerText === "Mark Done") {
        btn.innerText = "Completed";
        btn.className = "completed";
      } else {
        btn.innerText = "Mark Done";
        btn.className = "done";
      }
    };

    task.appendChild(span);
    task.appendChild(btn);
    dayDiv.appendChild(task);
  });

  container.appendChild(dayDiv);
}

selector.addEventListener("change", renderDay);

renderDay();

</script>

</body>
</html>
